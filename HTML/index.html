<!DOCTYPE html>
<!-- 
<!Doctype html> tells the browser that this is an HTML5 document
-->

<html>
<!-- HTML document starts here -->

<head>
    <!-- Head section: contains metadata (not shown on the webpage) -->

    <title>My First Website</title>
    <!-- Title: appears on the browser tab -->
</head>

<body>
    <h1>Title</h1>
    <!-- Body section: everything inside here is visible on the webpage -->
    <p>Learning HTML👌</p>      <!-- HTML  Elements  -->
    <p> HTML is not case Sensitive</p> 
</body>

</html>
<!-- HTML document ends here -->
